# Append-only release ledger — the durable lineage of every nightly + each promotion.
# Maintained by the release pipeline (see VERSIONING.md). NOT read by the helmfile; for traceability
# and tooling only. One row per artifact, appended in creation order. Never edit/reorder past rows.
releases:
  - version: "1.0.0"
    channel: stable
    base: "1.0.0"
    created: "2026-06-07T00:00:00Z"
    build-id: genesis
    # genesis stable: hand-seeded, no nightly predecessor (no promoted_from).
  - version: "1.0.1-nightly.20260619.1"
    channel: nightly
    base: "1.0.1"
    created: "2026-06-19T00:00:00Z"
    build-id: "manually seeded"
    seq: 1
    # stopgap: body re-purposed byte-for-byte from stable/1.0.0 until the real nightly pipeline lands.
