# Global config and platform provider (GCP/Azure)
# Combined with artifacts.yaml and resources.yaml via helmfile

environment: dev
platform:
  provider: GCP
  gcp:
    secretsProjectId: "divyam-production"
    bucket: "divyam-dev-gcs-router-raw-logs"
  azure:
    keyVaultUri: "https://divyam-azure-key-vault.vault.azure.net/"
    containerName: "divyam-dev-gcs-router-raw-logs"

chartBasePath: .
clusterDomain: ""
