# Global config and platform provider (GCP)
# Combined with artifacts.yaml and resources.yaml via helmfile

environment: dev                          # Environment name: dev | staging | preprod | prod
platform:
  provider: GCP
  gcp:
    secretsProjectId: "<gcp-project-id>"
    storage_configs:
      bucket: "<gcs-bucket-name>"

chartBasePath: /home/azureuser/deployments/divyam-helm-charts  # Absolute path to the helm charts repo
clusterDomain: ""                           # Leave empty for in-cluster; set for cross-cluster DNS

imagePullSecretConfig:
  enabled: false                            # Set to true if the cluster pulls images from a private registry
  secrets:
    - name: gar-pull-secret
