# Global config and platform provider (Azure)
# Sample values for Azure environment, actual file will be auto-generated by Terraform module.

environment: dev                          # Environment name: dev | staging | preprod | prod
platform:
  provider: AZURE
  azure:
    keyVaultUri: "https://<your-vault-name>.vault.azure.net/"
    storage_configs:
      container: ""
      storage_account: ""
    wif:
      tenantID: ""
      clientIdMap:
        router-controller: ""
        mysql: ""
        clickhouse: ""
        divyam-db-upgrades: ""
        divyam-evaluator: ""
        divyam-route-selector: ""
        selector-training: ""
        superset-postgres: ""

clusterDomain: ""                           # Leave empty for in-cluster; set for cross-cluster DNS

imagePullSecretConfig:
  enabled: true
