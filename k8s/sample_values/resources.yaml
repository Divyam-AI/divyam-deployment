# Database config and per-chart values (resources, nodeSelector, persistence, etc.)
# Merged with env.yaml and artifacts.yaml via helmfile

databases:
  mysql:
    host: "<mysql-host-ip>"
    port: 3306
    database: "divyam_<env>"

charts:
  router-controller:
    values:
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "1"
          memory: "2Gi"
      replicaCount: 1
      router:
        workerCount: 1
      nodeSelector:
        cloud.google.com/gke-spot: "true"
  
  router-controller-ingress:
    values:
      resources: {}
      ingress:
        deploy: false
        external: false
      nodeSelector:
        cloud.google.com/gke-spot: "true"

  divyam-route-selector:
    condition: false
    values:
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "1"
          memory: "2Gi"
      replicaCount: 1
      nodeSelector:
        cloud.google.com/gke-spot: "true"
  
  selector-training:
    values:
      schedule: "*/1 * * * *"
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      resources: {}
  
  divyam-evaluator:
    values:
      resources: {}
      nodeSelector:
        cloud.google.com/gke-spot: "true"

  altinity-clickhouse-operator:
    values:
      metrics:
        enabled: true
      nodeSelector:
        cloud.google.com/gke-spot: "true"

  clickhouse:
    values:
      clickhouse:
        resources:
          requests:
            cpu: "4"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "4Gi"
        nodeSelector:
          cloud.google.com/gke-spot: "true"
        persistence:
          size: 20Gi
          storageClass: "standard-rwo"
      keeper:
        resources:
          requests:
            cpu: "1"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "1Gi"
        nodeSelector:
          cloud.google.com/gke-spot: "true"
        localStorage:
          size: 10Gi
          storageClass: "standard-rwo"

  strimzi-kafka-operator:
    values:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      resources:
        limits:
          memory: 1Gi
          cpu: 1
        requests:
          memory: 1Gi
          cpu: 1

  kafka-cluster:
    values:
      nodeSelectorConfig:
        kafka:
          cloud.google.com/gke-spot: "true"
        zookeeper:
          cloud.google.com/gke-spot: "true"
        kafkaExporter:
          cloud.google.com/gke-spot: "true"
        entityOperator:
          cloud.google.com/gke-spot: "true"
      nodepool:
        storage:
          size: "20Gi"
          class: "standard-rwo"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "4Gi"
            cpu: "2"

  otel-collector:
    values:
      resources:
        requests:
          memory: "1Gi"
          cpu: 1
        limits:
          memory: "1Gi"
          cpu: 1
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      storage:
        size: 10Gi

  mysql:
    values:
      mysql:
        deploy: false
      adminer:
        deploy: true
        nodeSelector:
          cloud.google.com/gke-spot: "true"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

  divyam-redis:
    values:
      persistence:
        storageClass: "standard-rwo"
        size: 5Gi
        enabled: true
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      resources: {}

  superset-postgres:
    values:
      storage_class: standard-rwo
      storage: 5Gi
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      resources:
        requests:
          cpu: 2
          memory: 2Gi
        limits:
          cpu: 2
          memory: 2Gi

  infinity:
    values:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
        cloud.google.com/gke-spot: "true"
      resources:
        requests:
          memory: 12Gi
          cpu: 3
          nvidia.com/gpu: 1
        limits:
          memory: 12Gi
          cpu: 3
          nvidia.com/gpu: 1
      replicaCount: 1

  qdrant:
    values:
      persistence:
        storageClassName: "standard-rwo"
        size: 10Gi
        accessModes: ["ReadWriteOnce"]
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      resources:
        limits:
          cpu: 2
          memory: 4Gi
        requests:
          cpu: 2
          memory: 4Gi
      replicaCount: 3

  external-secrets-operator:
    values:
      installCRDs: true
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 100m
          memory: 512Mi
      nodeSelector:
        cloud.google.com/gke-spot: "true"

  kafka-connect:
    values:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      resources:
        requests:
          cpu: 1
          memory: 2Gi
        limits:
          cpu: 1
          memory: 2Gi
      workerReplicaCount: 2

  superset:
    values:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      supersetWorker:
        resources:
          limits:
            cpu: 1
            memory: 2Gi
          requests:
            cpu: 1
            memory: 2Gi

  superset-ingress:
    values:
      ingress:
        deploy: false
      backendNodeSelector:
        cloud.google.com/gke-spot: "true"

  divyam-db-upgrades:
    values:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
