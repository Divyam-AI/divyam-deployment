settings:
  use_spot_nodes: true
  storage_class: economyHdd   # Possible values: economyHdd, standardSsd, premiumSsd

charts:
  divyam-persistent-storage:
    values: {}
    
  divyam-router-controller:
    values:
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "1"
          memory: "2Gi"
      replicaCount: 1
      router:
        workerCount: 1


  divyam-router-controller-ingress:
    values:
      resources: {}
      ingress:
        deploy: true
        external: false


  divyam-route-selector:
    values:
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "1"
          memory: "2Gi"
      replicaCount: 1


  divyam-selector-training:
    values:
      schedule: "*/1 * * * *"
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "1"
          memory: "2Gi"

  divyam-evaluator:
    values:
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "1"
          memory: "2Gi"

  altinity-clickhouse-operator:
    values:
      metrics:
        enabled: true

  clickhouse:
    values:
      clickhouse:
        resources:
          requests:
            cpu: "4"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "4Gi"
        persistence:
          size: 20Gi
      keeper:
        resources:
          requests:
            cpu: "1"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "1Gi"
        localStorage:
          size: 10Gi

  strimzi-kafka-operator:
    values:
      resources:
        limits:
          memory: 1Gi
          cpu: 1
        requests:
          memory: 1Gi
          cpu: 1

  kafka-cluster:
    values:
      # Single-broker sandbox: one combined controller+broker node (nodepool.replicaCount 1), so
      # cluster-wide replication factor / min-ISR must be 1 — the chart defaults to RF=3, which a
      # single broker can never satisfy (Kafka CR stays NotReady, cascading to kafka-connect/otel).
      brokerReplicaCount: 1
      defaultReplicationFactor: 1
      defaultMinInsyncReplicas: 1
      nodepool:
        replicaCount: 1
        storage:
          size: "20Gi"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "4Gi"
            cpu: "2"
      # KafkaTopic CRs also default to RF=3; on a single broker they must be RF=1 or the Topic
      # Operator can never reconcile them. Two chart quirks this exposes on a single broker:
      #   - log topics need an explicit retentionBytes (chart otherwise renders retention.bytes: null);
      #   - connect_topics offsets/status partitions must match the live auto-created 25/5 (Strimzi
      #     can't shrink an existing topic's partition count).
      logs_topics:
        - name: router-metering-logs
          partitions: 5
          replicas: 1
          retentionMs: 7776000000
          retentionBytes: 2147483648
          segmentBytes: 1073741824
        - name: router-raw-logs
          partitions: 5
          replicas: 1
          retentionMs: 7776000000
          retentionBytes: 2147483648
          segmentBytes: 1073741824
      connect_topics:
        configs:
          replicas: 1
        offsets:
          partitions: 25
          replicas: 1
        status:
          partitions: 5
          replicas: 1
        dlq:
          replicas: 1

  otel-collector:
    values:
      resources:
        requests:
          memory: "1Gi"
          cpu: 1
        limits:
          memory: "1Gi"
          cpu: 1
      storage:
        size: 10Gi

  mysql:
    values:
      mysql:
        deploy: true
      adminer:
        deploy: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

  divyam-redis:
    values:
      persistence:
        size: 5Gi
        enabled: true
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "1"
          memory: "2Gi"

  superset-postgres:
    values:
      storage: 5Gi
      resources:
        requests:
          cpu: 2
          memory: 2Gi
        limits:
          cpu: 2
          memory: 2Gi

  #TODO: add gpu for infinity
  infinity:
    values:
      nodeSelector:
        node.kubernetes.io/instance-type: Standard_NV6ads_A10_v5

      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          memory: 12Gi
          cpu: 3
          nvidia.com/gpu: 1
        limits:
          memory: 12Gi
          cpu: 3
          nvidia.com/gpu: 1
      replicaCount: 1

  qdrant:
    values:
      persistence:
        size: 10Gi
        accessModes: ["ReadWriteOnce"]
      resources:
        limits:
          cpu: 2
          memory: 4Gi
        requests:
          cpu: 2
          memory: 4Gi
      replicaCount: 3

  external-secrets-operator:
    values:
      installCRDs: true
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 100m
          memory: 512Mi

  kafka-connect:
    values:
      resources:
        requests:
          cpu: 1
          memory: 2Gi
        limits:
          cpu: 1
          memory: 2Gi
      workerReplicaCount: 2

  superset:
    values:
      supersetWorker:
        resources:
          limits:
            cpu: 1
            memory: 2Gi
          requests:
            cpu: 1
            memory: 2Gi

  superset-ingress:
    values:
      ingress:
        deploy: true

  # # Client-side control-plane exporter.
  # divyam-control-plane-exporter:
  #   values: {}

  divyam-db-upgrades:
    values: {}

  divyam-e2e-test-runner:
    values:
      resources:
        requests:
          cpu: 1
          memory: 1Gi
        limits:
          cpu: 1
          memory: 1Gi

  cloudnative-pg-operator:
    values: {}
  opensearch-operator:
    values: {}
  redis-operator:
    values: {}

  # Per-consumer datastores (operator-managed CRs, co-located in each consumer ns).
  # NOTE: HA + backup key paths differ per datastore chart (see each chart's values.yaml).
  # Backups are gated off here - buckets/creds are terraform-provisioned per env, then
  # backup.enabled / snapshots.enabled are flipped on with the credential secret refs.
  temporal-postgres:
    values:
      cluster:
        instances: 2                                          # prod: 3
        storage: { storageClass: divyam-premium-ssd, size: 20Gi }
        resources:
          requests: { cpu: "500m", memory: "1Gi" }
          limits:   { cpu: "2",    memory: "4Gi" }
        highAvailability:
          enabled: false                                      # prod: true (with instances >= 3)
          minSyncReplicas: 1
          maxSyncReplicas: 1
      backup:
        enabled: false                                        # flip on once bucket+creds exist
        provider: ""                                          # s3 | azure | google
        destinationPath: ""                                   # e.g. s3://<bucket>/temporal-postgres
        retentionPolicy: "30d"
        schedule: "0 0 3 * * *"
  # Temporal uses Postgres advanced visibility (PG 12+), so there is no Temporal search datastore.
  lakefs-postgres:
    values:
      cluster:
        instances: 1                                          # prod: 3 (lakeFS PG is critical)
        storage: { storageClass: divyam-default, size: 10Gi }
      highAvailability:
        podAntiAffinity: true
        synchronousReplication: { enabled: false, number: 1 } # prod: enabled true at instances >= 2
      backup:
        enabled: false
        destinationPath: ""
        scheduledBackup: { enabled: false, schedule: "0 0 0 * * *" }
        retentionPolicy: "30d"
  argilla-postgres:
    values:
      cluster:
        instances: 1                                          # prod: >= 2
        storage: { storageClass: divyam-default, size: 10Gi }
      highAvailability:
        enabled: false
        synchronousReplication: false
        synchronousReplicas: 1
      backup:
        enabled: false
        destinationPath: ""                                   # s3://... | gs://... | azure container URL
        schedule: "0 0 2 * * *"
        retentionPolicy: "30d"
  argilla-opensearch:
    values:
      opensearch:
        # OpenSearch holds Argilla's PRIMARY records. Prod uses nodePool.replicas >= 2 with index replicas >= 1, plus snapshots.
        nodePool:
          replicas: 1                                         # prod >= 2, data-bearing and multi-node
          diskSize: "20Gi"
          storageClass: "divyam-default"
          jvm: "-Xms1g -Xmx1g"
        resources:
          requests: { cpu: "500m", memory: "2Gi" }
          limits:   { cpu: "1",    memory: "3Gi" }
  argilla-redis:
    values:
      redis:
        storage: { storageClass: divyam-default, size: 5Gi }  # transient job queue, not critical-data

  temporal:
    values: {}

  lakefs:
    values:
      highAvailability:
        pdb: { enabled: false }                               # prod: true
      lakefs:
        replicaCount: 1                                       # prod: >= 2 (lakeFS server is critical)

  argilla:
    values:
      server:
        replicaCount: 1
        resources:
          requests: { cpu: "500m", memory: "1Gi" }
          limits:   { cpu: "1",    memory: "2Gi" }
      worker:
        replicaCount: 1
        resources:
          requests: { cpu: "250m", memory: "512Mi" }
          limits:   { cpu: "500m", memory: "1Gi" }

  evalm8-server:
    values:
      server:
        replicaCount: 2
        resources:
          requests: { cpu: "500m", memory: "1Gi" }
          limits:   { cpu: "1",    memory: "2Gi" }
      highAvailability:
        pdb: { enabled: true, minAvailable: 1 }
        podAntiAffinity: { enabled: true }

  evalm8-wfs:
    values:
      worker:
        replicaCount: 2
        resources:
          requests: { cpu: "500m", memory: "1Gi" }
          limits:   { cpu: "1",    memory: "2Gi" }

  evalm8-ui:
    values:
      ui:
        replicaCount: 1
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits:   { cpu: "250m", memory: "256Mi" }

  evalm8-ingress:
    values: {}

