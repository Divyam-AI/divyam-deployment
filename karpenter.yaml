apiVersion: karpenter.azure.com/v1beta1
kind: AKSNodeClass
metadata:
  name: default
spec: {}
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: cpu-ondemand
spec:
  template:
    metadata:
      labels:
        workload-type: cpu
    spec:
      nodeClassRef:
        name: default
        kind: AKSNodeClass
        group: karpenter.azure.com
      requirements:
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"] 
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: cpu-spot
spec:
  template:
    metadata:
      labels:
        workload-type: cpu
    spec:
      nodeClassRef:
        name: default
        kind: AKSNodeClass
        group: karpenter.azure.com
      requirements:
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"] 
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-ondemand
spec:
  template:
    metadata:
      labels:
        nvidia.com/gpu.present: "true"
    spec:
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
      nodeClassRef:
        name: default
        kind: AKSNodeClass
        group: karpenter.azure.com
      requirements:
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"] 
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-spot
spec:
  template:
    metadata:
      labels:
        nvidia.com/gpu.present: "true"
    spec:
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
      nodeClassRef:
        name: default
        kind: AKSNodeClass
        group: karpenter.azure.com
      requirements:
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"] 